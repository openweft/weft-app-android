name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: unit tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # GitHub's ubuntu runners ship the Android SDK (ANDROID_HOME set);
      # the committed Gradle wrapper pins the version.
      - name: Unit tests (failover Supervisor + Config)
        run: ./gradlew :app:testDebugUnitTest
